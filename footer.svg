<svg width="100%" height="100%" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- WD2 Background -->
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    
    <!-- Hexagon Pattern -->
    <pattern id="hexPattern" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <path d="M 30,0 L 50,13 L 50,39 L 30,52 L 10,39 L 10,13 Z" 
            fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    
    <!-- Scanlines -->
    <pattern id="scanlines" x="0" y="0" width="100%" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100%" y2="0" stroke="#00ff41" stroke-width="0.5" opacity="0.03"/>
    </pattern>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      @keyframes waveFlow {
        0% { transform: translateX(0); }
        100% { transform: translateX(-1000px); }
      }
      @keyframes waveFlow2 {
        0% { transform: translateX(0); }
        100% { transform: translateX(-500px); }
      }
      @keyframes glitch {
        0%, 100% { opacity: 0; transform: translate(0, 0); }
        2%, 8% { opacity: 0.4; transform: translate(-3px, 1px); }
        4%, 6% { opacity: 0.4; transform: translate(3px, -1px); }
      }
      .footer-title {
        font-family: 'Courier New', monospace;
        font-size: 26px;
        font-weight: bold;
        fill: #00ff41;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .footer-subtitle {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #aaeeaa;
        letter-spacing: 1.5px;
      }
      .footer-text {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #888888;
      }
      .link-text {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
      }
      .glitch-shadow { animation: glitch 3s infinite; fill: #ff0066; }
      .wave-anim { animation: waveFlow 9s linear infinite; }
      .wave-anim-2 { animation: waveFlow2 14s linear infinite reverse; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="220" fill="url(#footerBg)"/>
  <rect width="1000" height="220" fill="url(#hexPattern)"/>
  <rect width="1000" height="220" fill="url(#scanlines)"/>
  
  <!-- Animated Scanline -->
  <rect width="1000" height="2" fill="#00ff41" opacity="0.25">
    <animate attributeName="y" values="-2;220;-2" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Wave 1 (Top) -->
  <g class="wave-anim">
    <path d="M0,25 Q50,10 100,25 T200,25 T300,25 T400,25 T500,25 T600,25 T700,25 T800,25 T900,25 T1000,25" 
          stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.35"/>
  </g>
  
  <!-- Wave 2 (Middle) -->
  <g class="wave-anim-2">
    <path d="M0,40 Q50,25 100,40 T200,40 T300,40 T400,40 T500,40 T600,40 T700,40 T800,40 T900,40 T1000,40" 
          stroke="#ff0066" stroke-width="1.2" fill="none" opacity="0.25" stroke-dasharray="4 4"/>
  </g>

  <!-- Top Border Line -->
  <line x1="0" y1="12" x2="1000" y2="12" stroke="#00ff41" stroke-width="2" opacity="0.4">
    <animate attributeName="stroke-dasharray" values="0 1000; 1000 0" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Main Content Section (STAY_CONNECTED) -->
  <g transform="translate(500, 50)">
    <text class="footer-title glitch-shadow" x="2" y="2" text-anchor="middle">
      STAY_CONNECTED
    </text>
    <text class="footer-title" x="0" y="0" text-anchor="middle" filter="url(#glow)">
      STAY_CONNECTED
    </text>
    <text class="footer-subtitle" x="0" y="24" text-anchor="middle">
      [ DEDSEC OPERATIVE // ALWAYS ONLINE ]
    </text>
  </g>

  <!-- Left Section: Social Networks -->
  <g transform="translate(50, 100)">
    <text class="footer-text" x="0" y="0" fill="#00ff41" font-weight="bold">// SOCIAL_NETWORKS</text>
    
    <!-- LinkedIn Button -->
    <a href="https://www.linkedin.com/in/omarwaelkishk" target="_blank">
      <rect x="0" y="12" width="130" height="32" fill="#050a05" stroke="#00ff41" stroke-width="1.5" rx="4" fill-opacity="0.8"/>
      <text class="link-text" x="65" y="32" text-anchor="middle" fill="#00ff41">LinkedIn</text>
    </a>
    
    <!-- GitHub Button (Fixed to omarwael78 & Label corrected to GitHub) -->
    <a href="https://github.com/omarwael78" target="_blank">
      <rect x="145" y="12" width="130" height="32" fill="#0a0505" stroke="#ff0066" stroke-width="1.5" rx="4" fill-opacity="0.8"/>
      <text class="link-text" x="210" y="32" text-anchor="middle" fill="#ff0066">GitHub</text>
    </a>
  </g>

  <!-- Center Section: Current Status -->
  <g transform="translate(400, 100)">
    <text class="footer-text" x="0" y="0" fill="#00ff41" font-weight="bold">// CURRENT_STATUS</text>
    
    <g transform="translate(0, 15)">
      <circle cx="8" cy="12" r="4" fill="#00ff41">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text class="footer-text" x="22" y="16" fill="#ffffff">Actively Coding</text>
    </g>
    
    <text class="footer-text" x="0" y="44" fill="#ff9900">☕ Coffee Level: MAXIMUM</text>
  </g>

  <!-- Right Section: Contact Me -->
  <g transform="translate(750, 100)">
    <text class="footer-text" x="200" y="0" fill="#00ff41" font-weight="bold" text-anchor="end">// CONTACT_ME</text>
    
    <!-- Email Button -->
    <a href="mailto:owael2003@gmail.com" target="_blank">
      <rect x="70" y="12" width="130" height="32" fill="#0a0a05" stroke="#ff9900" stroke-width="1.5" rx="4" fill-opacity="0.8"/>
      <text class="link-text" x="135" y="32" text-anchor="middle" fill="#ff9900">Email</text>
    </a>
  </g>

  <!-- Bottom Quote Section -->
  <g transform="translate(500, 185)">
    <text class="footer-text" x="0" y="0" text-anchor="middle" fill="#777777" font-style="italic">
      "Code is poetry written in logic" — WRENCH // DEDSEC
    </text>
    
    <!-- Floating particles effect -->
    <circle cx="-220" cy="-5" r="1.5" fill="#00ff41" opacity="0.6">
      <animate attributeName="cy" values="-5;-25;-5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-170" cy="-5" r="1.5" fill="#ff0066" opacity="0.6">
      <animate attributeName="cy" values="-5;-20;-5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="-5" r="1.5" fill="#ff9900" opacity="0.6">
      <animate attributeName="cy" values="-5;-22;-5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="-5" r="1.5" fill="#00ff41" opacity="0.6">
      <animate attributeName="cy" values="-5;-18;-5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner Accents -->
  <g opacity="0.5">
    <path d="M 25 35 L 25 20 L 60 20" fill="none" stroke="#00ff41" stroke-width="1.5"/>
    <path d="M 975 35 L 975 20 L 940 20" fill="none" stroke="#00ff41" stroke-width="1.5"/>
    <path d="M 25 185 L 25 200 L 60 200" fill="none" stroke="#ff0066" stroke-width="1.5"/>
    <path d="M 975 185 L 975 200 L 940 200" fill="none" stroke="#ff0066" stroke-width="1.5"/>
  </g>

  <!-- Footer Metadata -->
  <text class="footer-text" x="15" y="212" fill="#555555" font-size="10">
    v2.2 // DEPLOYED_STABLE
  </text>
  
  <text class="footer-text" x="985" y="212" text-anchor="end" fill="#555555" font-size="10">
    © 2026 DEDSEC // OMAR_WAEL
  </text>
</svg>
