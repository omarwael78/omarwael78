<svg width="100%" height="100%" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes glitch {
        0%, 100% { transform: translate(0, 0); opacity: 1; }
        20% { transform: translate(-2px, 2px); opacity: 0.8; }
        40% { transform: translate(2px, -2px); opacity: 0.9; }
        60% { transform: translate(-1px, 1px); opacity: 0.85; }
        80% { transform: translate(1px, -1px); opacity: 0.95; }
      }
      
      @keyframes scanline {
        0% { transform: translateY(0); }
        100% { transform: translateY(600px); }
      }
      
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      
      @keyframes dataFlow {
        0% { transform: translateX(0); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateX(300px); opacity: 0; }
      }
      
      @keyframes hexRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      
      /* WD2 Style Fonts */
      .wd2-title {
        font-family: 'Courier New', monospace;
        font-size: 48px;
        font-weight: bold;
        fill: #00ff41;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      
      .wd2-subtitle {
        font-family: 'Courier New', monospace;
        font-size: 16px;
        fill: #00ff41;
        letter-spacing: 2px;
      }
      
      .status-text {
        font-family: 'Courier New', monospace;
        font-size: 14px;
        fill: #ffffff;
        font-weight: bold;
      }
      
      .info-label {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #00ff41;
      }
      
      .info-value {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #ffffff;
        font-weight: bold;
      }
      
      .hack-text {
        font-family: 'Courier New', monospace;
        font-size: 11px;
        fill: #00ff41;
      }
      
      .alert-text {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #ff0066;
        font-weight: bold;
      }
      
      .glitch-effect {
        animation: glitch 0.3s infinite;
      }
      
      .blink-cursor {
        animation: blink 1s infinite;
      }
    </style>
    
    <!-- Gradient للخلفية -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="50%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    
    <!-- Hexagon Pattern -->
    <pattern id="hexPattern" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <path d="M 30,0 L 50,13 L 50,39 L 30,52 L 10,39 L 10,13 Z" 
            fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    
    <!-- Scanline Effect -->
    <pattern id="scanlines" x="0" y="0" width="100%" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100%" y2="0" stroke="#00ff41" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    
    <!-- Digital Noise -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" />
      <feColorMatrix type="saturate" values="0"/>
      <feBlend mode="multiply" in="SourceGraphic"/>
    </filter>
    
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bgGrad)"/>
  <rect width="1000" height="600" fill="url(#hexPattern)"/>
  <rect width="1000" height="600" fill="url(#scanlines)"/>
  
  <!-- Moving Scanline -->
  <rect width="1000" height="2" fill="#00ff41" opacity="0.3">
    <animate attributeName="y" values="-2;600;-2" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Corner Brackets - Top Left -->
  <g opacity="0.8">
    <line x1="30" y1="30" x2="100" y2="30" stroke="#00ff41" stroke-width="3"/>
    <line x1="30" y1="30" x2="30" y2="100" stroke="#00ff41" stroke-width="3"/>
  </g>
  
  <!-- Corner Brackets - Top Right -->
  <g opacity="0.8">
    <line x1="970" y1="30" x2="900" y2="30" stroke="#00ff41" stroke-width="3"/>
    <line x1="970" y1="30" x2="970" y2="100" stroke="#00ff41" stroke-width="3"/>
  </g>
  
  <!-- Corner Brackets - Bottom Left -->
  <g opacity="0.8">
    <line x1="30" y1="570" x2="100" y2="570" stroke="#00ff41" stroke-width="3"/>
    <line x1="30" y1="570" x2="30" y2="500" stroke="#00ff41" stroke-width="3"/>
  </g>
  
  <!-- Corner Brackets - Bottom Right -->
  <g opacity="0.8">
    <line x1="970" y1="570" x2="900" y2="570" stroke="#00ff41" stroke-width="3"/>
    <line x1="970" y1="570" x2="970" y2="500" stroke="#00ff41" stroke-width="3"/>
  </g>
  
  <!-- Header Section -->
  <g transform="translate(500, 80)">
    <!-- Wrench Icon -->
    <g transform="translate(-450, -40)">
      <path d="M 20,10 L 35,25 L 25,35 L 10,20 L 5,25 L 0,20 L 5,15 L 10,20 Z M 35,25 L 50,40 L 45,45 L 30,30 Z" 
            fill="#00ff41" filter="url(#glow)" opacity="0.9">
        <animateTransform attributeName="transform" type="rotate" 
                         values="0 25 25; 10 25 25; 0 25 25" 
                         dur="2s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Status Indicator -->
    <circle cx="-400" cy="-25" r="6" fill="#00ff41">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Main Title -->
    <text class="wd2-title glitch-effect" x="0" y="0" text-anchor="middle" filter="url(#glow)">
      OMAR_WAEL // SRGN_OF_DTH
    </text>
    
    <text class="wd2-subtitle" x="0" y="25" text-anchor="middle" opacity="0.8">
      [ DEDSEC_OPERATIVE // FULL_STACK_HACKER ]
    </text>
  </g>
  
  <!-- Diagonal Separator Line -->
  <line x1="100" y1="130" x2="900" y2="130" stroke="#00ff41" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="132" x2="900" y2="132" stroke="#00ff41" stroke-width="1" opacity="0.2">
    <animate attributeName="stroke-dasharray" values="0 900; 900 0" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Main Panel Container -->
  <g transform="translate(80, 160)">
    <!-- Left Panel: System Info -->
    <rect width="400" height="380" fill="#000000" fill-opacity="0.7" 
          stroke="#00ff41" stroke-width="2" rx="4"/>
    
    <!-- Animated Corner Details -->
    <circle cx="10" cy="10" r="3" fill="#00ff41" opacity="0.8"/>
    <circle cx="390" cy="10" r="3" fill="#00ff41" opacity="0.8"/>
    <circle cx="10" cy="370" r="3" fill="#00ff41" opacity="0.8"/>
    <circle cx="390" cy="370" r="3" fill="#00ff41" opacity="0.8"/>
    
    <g transform="translate(20, 30)">
      <text class="status-text" x="0" y="0" fill="#00ff41">// OPERATIVE_STATUS</text>
      <line x1="0" y1="8" x2="150" y2="8" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
      
      <text class="info-label" x="0" y="35">▸ CODENAME:</text>
      <text class="info-value" x="150" y="35">OMAR_WAEL</text>
      
      <text class="info-label" x="0" y="60">▸ ROLE:</text>
      <text class="info-value" x="150" y="60">FULL_STACK_DEV</text>
      
      <text class="info-label" x="0" y="85">▸ LOCATION:</text>
      <text class="info-value" x="150" y="85">CYBER_SPACE</text>
      
      <text class="info-label" x="0" y="110">▸ STATUS:</text>
      <text class="info-value" x="150" y="110" fill="#00ff41">
        ONLINE
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
      </text>
      
      <line x1="0" y1="130" x2="360" y2="130" stroke="#00ff41" stroke-width="1" opacity="0.2"/>
      
      <text class="status-text" x="0" y="160" fill="#00ff41">// SKILL_SET</text>
      <line x1="0" y1="168" x2="120" y2="168" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
      
      <text class="hack-text" x="0" y="190">→ Python: Django | FastAPI | Flask</text>
      <text class="hack-text" x="0" y="210">→ Frontend: React | JavaScript | jQuery</text>
      <text class="hack-text" x="0" y="230">→ DevOps: Docker | Kubernetes | Linux</text>
      <text class="hack-text" x="0" y="250">→ AI: LangChain | CrewAI | n8n</text>
      <text class="hack-text" x="0" y="270">→ Database: PostgreSQL | MySQL | Redis</text>
      
      <line x1="0" y1="290" x2="360" y2="290" stroke="#00ff41" stroke-width="1" opacity="0.2"/>
      
      <text class="status-text" x="0" y="320" fill="#ff0066">// WARNING</text>
      <text class="alert-text" x="0" y="345">⚠ Do not disturb during coffee hours</text>
    </g>
  </g>
  
  <!-- Right Panel: Active Processes -->
  <g transform="translate(520, 160)">
    <rect width="400" height="380" fill="#000000" fill-opacity="0.7" 
          stroke="#00ff41" stroke-width="2" rx="4"/>
    
    <circle cx="10" cy="10" r="3" fill="#00ff41" opacity="0.8"/>
    <circle cx="390" cy="10" r="3" fill="#00ff41" opacity="0.8"/>
    <circle cx="10" cy="370" r="3" fill="#00ff41" opacity="0.8"/>
    <circle cx="390" cy="370" r="3" fill="#00ff41" opacity="0.8"/>
    
    <g transform="translate(20, 30)">
      <text class="status-text" x="0" y="0" fill="#00ff41">// ACTIVE_PROCESSES</text>
      <line x1="0" y1="8" x2="180" y2="8" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
      
      <!-- Process 1 -->
      <g transform="translate(0, 35)">
        <rect width="8" height="8" fill="#00ff41">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
        </rect>
        <text class="hack-text" x="15" y="8">BACKEND_API // Running</text>
        <rect x="200" y="0" width="150" height="10" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
        <rect x="200" y="0" width="140" height="10" fill="#00ff41" opacity="0.5">
          <animate attributeName="width" values="0;140;0" dur="3s" repeatCount="indefinite"/>
        </rect>
      </g>
      
      <!-- Process 2 -->
      <g transform="translate(0, 65)">
        <rect width="8" height="8" fill="#00ff41">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.3s" repeatCount="indefinite"/>
        </rect>
        <text class="hack-text" x="15" y="8">FRONTEND_BUILD // Active</text>
        <rect x="200" y="0" width="150" height="10" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
        <rect x="200" y="0" width="120" height="10" fill="#00ff41" opacity="0.5">
          <animate attributeName="width" values="0;120;0" dur="2.5s" repeatCount="indefinite"/>
        </rect>
      </g>
      
      <!-- Process 3 -->
      <g transform="translate(0, 95)">
        <rect width="8" height="8" fill="#00ff41">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.7s" repeatCount="indefinite"/>
        </rect>
        <text class="hack-text" x="15" y="8">AI_AGENT_CREW // Training</text>
        <rect x="200" y="0" width="150" height="10" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
        <rect x="200" y="0" width="90" height="10" fill="#ff9900" opacity="0.5">
          <animate attributeName="width" values="0;90;0" dur="2s" repeatCount="indefinite"/>
        </rect>
      </g>
      
      <!-- Process 4 -->
      <g transform="translate(0, 125)">
        <rect width="8" height="8" fill="#ff0066">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="0.8s" repeatCount="indefinite"/>
        </rect>
        <text class="hack-text" x="15" y="8" fill="#ff0066">COFFEE_LEVEL // CRITICAL</text>
        <rect x="200" y="0" width="150" height="10" fill="none" stroke="#ff0066" stroke-width="1" opacity="0.3"/>
        <rect x="200" y="0" width="30" height="10" fill="#ff0066" opacity="0.7"/>
      </g>
      
      <line x1="0" y1="155" x2="360" y2="155" stroke="#00ff41" stroke-width="1" opacity="0.2"/>
      
      <text class="status-text" x="0" y="185" fill="#00ff41">// DATA_STREAM</text>
      <line x1="0" y1="193" x2="130" y2="193" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
      
      <!-- Data Flow Animation -->
      <g>
        <text class="hack-text" x="0" y="220" opacity="0">
          &gt;&gt; Encrypting payload...
          <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="x" values="0;300" dur="3s" repeatCount="indefinite"/>
        </text>
        
        <text class="hack-text" x="0" y="245" opacity="0">
          &gt;&gt; Deploying to production...
          <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1s" repeatCount="indefinite"/>
          <animate attributeName="x" values="0;300" dur="3s" begin="1s" repeatCount="indefinite"/>
        </text>
        
        <text class="hack-text" x="0" y="270" opacity="0">
          &gt;&gt; Hacking the mainframe...
          <animate attributeName="opacity" values="0;1;0" dur="3s" begin="2s" repeatCount="indefinite"/>
          <animate attributeName="x" values="0;300" dur="3s" begin="2s" repeatCount="indefinite"/>
        </text>
      </g>
      
      <line x1="0" y1="295" x2="360" y2="295" stroke="#00ff41" stroke-width="1" opacity="0.2"/>
      
      <!-- Hexagon Loader -->
      <g transform="translate(180, 330)">
        <path d="M 0,-20 L 17,-10 L 17,10 L 0,20 L -17,10 L -17,-10 Z" 
              fill="none" stroke="#00ff41" stroke-width="2" opacity="0.8">
          <animateTransform attributeName="transform" type="rotate" 
                           from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
        </path>
        <circle cx="0" cy="0" r="5" fill="#00ff41">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </g>
  
  <!-- Bottom Status Bar -->
  <g transform="translate(80, 560)">
    <rect width="840" height="25" fill="#000000" fill-opacity="0.9" 
          stroke="#00ff41" stroke-width="1"/>
    
    <text class="hack-text" x="10" y="17">
      DEDSEC // WRENCH_OS v2.0 // UPTIME: ∞ // BUGS_FIXED: 9999+
    </text>
    
    <text class="hack-text" x="650" y="17">
      CONNECTION: <tspan fill="#00ff41" class="blink-cursor">SECURE</tspan>
    </text>
  </g>
  
  <!-- Floating Digital Elements -->
  <g opacity="0.3">
    <text x="50" y="300" font-family="'Courier New', monospace" font-size="10" fill="#00ff41">01101111</text>
    <text x="920" y="250" font-family="'Courier New', monospace" font-size="10" fill="#00ff41">01110111</text>
    <text x="80" y="450" font-family="'Courier New', monospace" font-size="10" fill="#00ff41">01100001</text>
    <text x="900" y="400" font-family="'Courier New', monospace" font-size="10" fill="#00ff41">01100101</text>
  </g>
</svg>
