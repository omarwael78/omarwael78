<svg width="100%" height="100%" viewBox="0 0 1200 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
      @keyframes pulse { 0% { r: 4; opacity: 1; } 100% { r: 9; opacity: 0; } }
      @keyframes typeLine { from { width: 0; } to { width: 100%; } }
      @keyframes chartMove { 0% { transform: scaleY(0.8); } 50% { transform: scaleY(1.1); } 100% { transform: scaleY(0.8); } }
      
      .term-title { font-family: 'Courier New', monospace; font-size: 14px; fill: #00cc66; font-weight: bold; }
      .stat-label { font-family: 'Courier New', monospace; font-size: 12px; fill: #aaaaaa; }
      .stat-val { font-family: 'Courier New', monospace; font-size: 13px; fill: #ffffff; font-weight: bold; }
      .log-txt { font-family: 'Courier New', monospace; font-size: 12px; fill: #00cc66; white-space: nowrap; }
      .log-err { font-family: 'Courier New', monospace; font-size: 12px; fill: #cc0066; }
      
      /* حركاتك الأصلية المستقرة */
      .live-pulse { animation: pulse 1.5s infinite ease-out; }
      .live-dot { animation: blink 1.5s infinite; }
      .chart-bar { transform-origin: bottom; animation: chartMove 3s infinite ease-in-out; }
      .type-effect { overflow: hidden; display: inline-block; animation: typeLine 2s steps(40, end) infinite alternate; }
    </style>
  </defs>

  <!-- الخلفية الفحمية بعد زيادة العرض لـ 1200 -->
  <rect width="1200" height="230" fill="#070708" rx="6" stroke="#222222" stroke-width="1"/>

  <!-- هيدر الشاشة الحية -->
  <g transform="translate(25, 30)">
    <circle class="live-pulse" cx="10" cy="-4" r="4" fill="#00cc66" />
    <circle cx="10" cy="-4" r="4" fill="#00cc66" />
    <text class="term-title" x="25" y="0">[🟢 SYSTEM LIVE MONITOR - DJANGO CORE]</text>
  </g>

  <!-- الجانب الأيسر: الإحصائيات مفرودة في مساحة 800 بكسل لوحدها -->
  <g transform="translate(25, 65)">
    <!-- السطر الأول المعدل -->
    <text class="stat-label" x="0" y="15">Server Status:</text>
    <text class="stat-val" x="140" y="15" fill="#00cc66">Running Successfully until you edit it without omar permission</text>

    <!-- السطر الثاني المعدل -->
    <text class="stat-label" x="0" y="45">Response Time:</text>
    <text class="stat-val" x="140" y="45">18ms <tspan fill="#cc0066" font-size="11"> (Ultra fast until you call me on vacations)</tspan></text>

    <!-- باقي العدادات بمسافات مريحة جداً -->
    <text class="stat-label" x="0" y="75">Total Requests:</text>
    <text class="stat-val" x="140" y="75">45,218 <tspan class="live-dot" fill="#00cc66">✦</tspan></text>

    <text class="stat-label" x="0" y="115">Coffee Dev Ratio:</text>
    <text class="stat-val" x="140" y="115" fill="#cc0066">1 Long Shot : 400 Lines written</text>
    <text class="stat-label" x="0" y="135">Bugs in Prod:</text>
    <text class="stat-val" x="140" y="135" fill="#cc0066">0 (We don't talk about local)</text>
  </g>

  <!-- ترحيل الخط الفاصل لـ x=820 لمنع أي تداخل نهائياً -->
  <line x1="820" y1="55" x2="820" y2="195" stroke="#222222" stroke-width="1"/>

  <!-- الجانب الأيمن العلوي: الأنميشن الأصلي مرحّل لمكانه الآمن الجديد (x=850) -->
  <g transform="translate(850, 55)">
    <text class="stat-label" x="0" y="15">API Traffic Load (Live):</text>
    
    <g transform="translate(0, 50)">
      <rect class="chart-bar" x="200" y="-30" width="12" height="30" fill="#00cc66" rx="2" style="animation-delay: 0s;"/>
      <rect class="chart-bar" x="220" y="-45" width="12" height="45" fill="#00cc66" rx="2" style="animation-delay: 0.2s;"/>
      <rect class="chart-bar" x="240" y="-20" width="12" height="20" fill="#00cc66" rx="2" style="animation-delay: 0.4s;"/>
      <rect class="chart-bar" x="260" y="-55" width="12" height="55" fill="#cc0066" rx="2" style="animation-delay: 0.6s;"/>
      <rect class="chart-bar" x="280" y="-35" width="12" height="35" fill="#00cc66" rx="2" style="animation-delay: 0.8s;"/>
      <rect class="chart-bar" x="300" y="-40" width="12" height="40" fill="#00cc66" rx="2" style="animation-delay: 1s;"/>
    </g>
  </g>

  <!-- الجانب الأيمن السفلي: الـ Logs مرحّلة لمكانها الآمن الجديد (x=850) -->
  <g transform="translate(850, 140)">
    <line x1="0" y1="0" x2="310" y2="0" stroke="#222222" stroke-width="1"/>
    <text class="stat-label" x="0" y="20">Latest Activity Log:</text>
    
    <g transform="translate(0, 42)">
      <text class="log-txt type-effect">» Django API: Secure Token Generated successfully.</text>
    </g>
    <g transform="translate(0, 58)">
      <text class="log-err">» System check: 0 errors / 100% test coverage passed.</text>
    </g>
  </g>
</svg>
