<svg width="100%" height="100%" viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- WD2 Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    
    <!-- Hexagon Pattern -->
    <pattern id="hexPattern" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <path d="M 30,0 L 50,13 L 50,39 L 30,52 L 10,39 L 10,13 Z" 
            fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.02"/>
    </pattern>
    
    <!-- Scanlines -->
    <pattern id="scanlines" x="0" y="0" width="100%" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100%" y2="0" stroke="#00ff41" stroke-width="0.5" opacity="0.03"/>
    </pattern>
    
    <!-- WD2 Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      @keyframes float { 
        0%, 100% { transform: translateY(0); } 
        50% { transform: translateY(-8px); } 
      }
      @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
      @keyframes scanMove { 0% { transform: translateY(0); } 100% { transform: translateY(550px); } }
      @keyframes glitch {
        0%, 100% { opacity: 0; }
        2%, 8% { opacity: 0.5; transform: translate(-2px, 0); }
        4%, 6% { opacity: 0.5; transform: translate(2px, 0); }
      }
      @keyframes dataFlow {
        0% { transform: translateX(-500px); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateX(500px); opacity: 0; }
      }
      
      .main-title { 
        font-family: 'Courier New', monospace; 
        font-size: 36px; 
        font-weight: bold; 
        fill: #ffffff; 
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .section-title { 
        font-family: 'Courier New', monospace; 
        font-size: 18px; 
        font-weight: bold; 
      }
      .tool-text { 
        font-family: 'Courier New', monospace; 
        font-size: 14px; 
        fill: #ffffff; 
        font-weight: bold;
      }
      .desc-text { 
        font-family: 'Courier New', monospace; 
        font-size: 11px; 
        fill: #aaaaaa; 
      }
      .tag-text { 
        font-family: 'Courier New', monospace; 
        font-size: 12px; 
        fill: #00ff41; 
        font-weight: bold;
      }
      
      .green-glow { fill: #00ff41; }
      .pink-glow { fill: #ff0066; }
      .orange-glow { fill: #ff9900; }
      
      .card-green { stroke: #00ff41; stroke-width: 2; fill: #000000; fill-opacity: 0.85; }
      .card-pink { stroke: #ff0066; stroke-width: 2; fill: #000000; fill-opacity: 0.85; }
      .card-orange { stroke: #ff9900; stroke-width: 2; fill: #000000; fill-opacity: 0.85; }
      
      .scan-line { stroke-width: 1.5; opacity: 0.6; }
      .glitch-shadow { animation: glitch 3s infinite; }
      .float-card { animation: float 3s infinite ease-in-out; }
    </style>
  </defs>
  
  <!-- Background Layers -->
  <rect width="1000" height="550" fill="url(#bgGrad)" rx="8"/>
  <rect width="1000" height="550" fill="url(#hexPattern)"/>
  <rect width="1000" height="550" fill="url(#grid)"/>
  <rect width="1000" height="550" fill="url(#scanlines)"/>
  
  <!-- Animated Scanline -->
  <rect width="1000" height="2" fill="#00ff41" opacity="0.3">
    <animate attributeName="y" values="-2;550;-2" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner Brackets -->
  <g opacity="0.8">
    <line x1="30" y1="25" x2="110" y2="25" stroke="#00ff41" stroke-width="3"/>
    <line x1="30" y1="25" x2="30" y2="105" stroke="#00ff41" stroke-width="3"/>
    <line x1="970" y1="25" x2="890" y2="25" stroke="#00ff41" stroke-width="3"/>
    <line x1="970" y1="25" x2="970" y2="105" stroke="#00ff41" stroke-width="3"/>
    <line x1="30" y1="525" x2="110" y2="525" stroke="#00ff41" stroke-width="3"/>
    <line x1="30" y1="525" x2="30" y2="445" stroke="#00ff41" stroke-width="3"/>
    <line x1="970" y1="525" x2="890" y2="525" stroke="#00ff41" stroke-width="3"/>
    <line x1="970" y1="525" x2="970" y2="445" stroke="#00ff41" stroke-width="3"/>
  </g>

  <!-- Top Decorative Line -->
  <line x1="60" y1="60" x2="940" y2="60" stroke="#00ff41" stroke-width="2" opacity="0.4">
    <animate attributeName="stroke-dasharray" values="0 880; 880 0" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Header Section -->
  <g transform="translate(500, 42)">
    <!-- Glitch Title Shadow -->
    <text class="main-title glitch-shadow" x="0" y="0" text-anchor="middle" fill="#ff0066" opacity="0.5">
      CURRENT TECH STACK
    </text>
    
    <!-- Surrounding Dots (WD2 style) -->
    <circle cx="-260" cy="-5" r="4" fill="#00ff41">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-245" cy="-5" r="5.5" fill="#00ff41">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-230" cy="-5" r="7" fill="#00ff41" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
    </circle>
    
    <text class="main-title green-glow" x="0" y="0" text-anchor="middle" filter="url(#neonGlow)">
      CURRENT TECH STACK
    </text>
    
    <circle cx="230" cy="-5" r="7" fill="#00ff41" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="-5" r="5.5" fill="#00ff41">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="-5" r="4" fill="#00ff41">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Divider -->
  <line x1="60" y1="90" x2="940" y2="90" stroke="#222222" stroke-width="1" opacity="0.5"/>

  <!-- CARD 1: Backend -->
  <g transform="translate(50, 115)">
    <rect class="card-green float-card" width="425" height="190" rx="4"/>
    <!-- Card Corner Indicators -->
    <circle cx="10" cy="10" r="3" fill="#00ff41" opacity="0.9"/>
    <circle cx="415" cy="10" r="3" fill="#00ff41" opacity="0.9"/>
    <circle cx="10" cy="180" r="3" fill="#00ff41" opacity="0.9"/>
    <circle cx="415" cy="180" r="3" fill="#00ff41" opacity="0.9"/>
    
    <!-- Scanner Line -->
    <line class="scan-line" stroke="#00ff41" x1="10" y1="0" x2="415" y2="0">
      <animate attributeName="y1" values="5;185;5" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="5;185;5" dur="4s" repeatCount="indefinite"/>
    </line>
    
    <!-- Side Accent Bar -->
    <rect x="5" y="12" width="4" height="166" fill="#00ff41" opacity="0.4"/>
    
    <circle cx="35" cy="35" r="6" fill="#00ff41">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text class="section-title green-glow" x="55" y="40">⚙️ // BACKEND_CORE</text>
    <line x1="55" y1="45" x2="200" y2="45" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
    
    <text class="tool-text" x="35" y="75">→ Django 5.x</text>
    <text class="desc-text" x="55" y="93">Monolithic apps, REST APIs, Admin power</text>
    
    <text class="tool-text" x="35" y="120">→ FastAPI</text>
    <text class="desc-text" x="55" y="138">High-performance async APIs, AI integration</text>
    
    <text class="tool-text" x="35" y="165">→ PostgreSQL + Redis</text>
    <text class="desc-text" x="55" y="183">Data persistence + caching layer</text>
  </g>

  <!-- CARD 2: Frontend -->
  <g transform="translate(525, 115)">
    <rect class="card-pink float-card" width="425" height="190" rx="4" style="animation-delay: 0.3s;"/>
    <circle cx="10" cy="10" r="3" fill="#ff0066" opacity="0.9"/>
    <circle cx="415" cy="10" r="3" fill="#ff0066" opacity="0.9"/>
    <circle cx="10" cy="180" r="3" fill="#ff0066" opacity="0.9"/>
    <circle cx="415" cy="180" r="3" fill="#ff0066" opacity="0.9"/>
    
    <line class="scan-line" stroke="#ff0066" x1="10" y1="0" x2="415" y2="0">
      <animate attributeName="y1" values="185;5;185" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="185;5;185" dur="4.5s" repeatCount="indefinite"/>
    </line>
    
    <rect x="5" y="12" width="4" height="166" fill="#ff0066" opacity="0.4"/>
    
    <circle cx="35" cy="35" r="6" fill="#ff0066">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <text class="section-title pink-glow" x="55" y="40">🎨 // FRONTEND_TOOLS</text>
    <line x1="55" y1="45" x2="210" y2="45" stroke="#ff0066" stroke-width="1" opacity="0.3"/>
    
    <text class="tool-text" x="35" y="75">→ React 18</text>
    <text class="desc-text" x="55" y="93">Component-based UIs, state management</text>
    
    <text class="tool-text" x="35" y="120">→ Bootstrap + Tailwind CSS</text>
    <text class="desc-text" x="55" y="138">Rapid prototyping, responsive design</text>
    
    <text class="tool-text" x="35" y="165">→ jQuery (when needed)</text>
    <text class="desc-text" x="55" y="183">Quick DOM manipulation for legacy projects</text>
  </g>

  <!-- CARD 3: DevOps -->
  <g transform="translate(50, 330)">
    <rect class="card-green float-card" width="425" height="190" rx="4" style="animation-delay: 0.6s;"/>
    <circle cx="10" cy="10" r="3" fill="#00ff41" opacity="0.9"/>
    <circle cx="415" cy="10" r="3" fill="#00ff41" opacity="0.9"/>
    <circle cx="10" cy="180" r="3" fill="#00ff41" opacity="0.9"/>
    <circle cx="415" cy="180" r="3" fill="#00ff41" opacity="0.9"/>
    
    <line class="scan-line" stroke="#00ff41" x1="10" y1="0" x2="415" y2="0">
      <animate attributeName="y1" values="5;185;5" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="5;185;5" dur="5s" repeatCount="indefinite"/>
    </line>
    
    <rect x="5" y="12" width="4" height="166" fill="#00ff41" opacity="0.4"/>
    
    <circle cx="35" cy="35" r="6" fill="#00ff41">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <text class="section-title green-glow" x="55" y="40">🐳 // DEVOPS_&amp;_INFRA</text>
    <line x1="55" y1="45" x2="210" y2="45" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
    
    <text class="tool-text" x="35" y="75">→ Docker + Kubernetes</text>
    <text class="desc-text" x="55" y="93">Containerization, orchestration, scaling</text>
    
    <text class="tool-text" x="35" y="120">→ Linux (Ubuntu btw) + Bash</text>
    <text class="desc-text" x="55" y="138">Server management, automation scripts</text>
    
    <text class="tool-text" x="35" y="165">→ GitHub Actions</text>
    <text class="desc-text" x="55" y="183">CI/CD pipelines, automated testing</text>
  </g>

  <!-- CARD 4: AI & Automation -->
  <g transform="translate(525, 330)">
    <rect class="card-orange float-card" width="425" height="190" rx="4" style="animation-delay: 0.9s;"/>
    <circle cx="10" cy="10" r="3" fill="#ff9900" opacity="0.9"/>
    <circle cx="415" cy="10" r="3" fill="#ff9900" opacity="0.9"/>
    <circle cx="10" cy="180" r="3" fill="#ff9900" opacity="0.9"/>
    <circle cx="415" cy="180" r="3" fill="#ff9900" opacity="0.9"/>
    
    <line class="scan-line" stroke="#ff9900" x1="10" y1="0" x2="415" y2="0">
      <animate attributeName="y1" values="185;5;185" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="185;5;185" dur="3.8s" repeatCount="indefinite"/>
    </line>
    
    <rect x="5" y="12" width="4" height="166" fill="#ff9900" opacity="0.4"/>
    
    <circle cx="35" cy="35" r="6" fill="#ff9900">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <text class="section-title orange-glow" x="55" y="40">🤖 // AI_&amp;_AUTOMATION</text>
    <line x1="55" y1="45" x2="220" y2="45" stroke="#ff9900" stroke-width="1" opacity="0.3"/>
    
    <text class="tool-text" x="35" y="75">→ LangChain + CrewAI</text>
    <text class="desc-text" x="55" y="93">Multi-agent systems, LLM orchestration</text>
    
    <text class="tool-text" x="35" y="120">→ n8n + Zapier</text>
    <text class="desc-text" x="55" y="138">Workflow automation, API integrations</text>
    
    <text class="tool-text" x="35" y="165">→ OpenAI API + Ollama</text>
    <text class="desc-text" x="55" y="183">Cloud &amp; local LLM deployment</text>
  </g>

  <!-- Floating Binary Elements -->
  <g opacity="0.1">
    <text x="55" y="290" font-family="'Courier New', monospace" font-size="9" fill="#00ff41">
      01101111_01110111_01100001_01100101
    </text>
    <text x="880" y="260" font-family="'Courier New', monospace" font-size="9" fill="#ff0066">
      01110000_01101001_01101100_01101100
    </text>
    <text x="55" y="510" font-family="'Courier New', monospace" font-size="9" fill="#ff9900">
      01101000_01100001_01100011_01101011
    </text>
  </g>

  <!-- Bottom Status Bar -->
  <g transform="translate(50, 540)">
    <text class="tag-text" x="0" y="0">
      DEDSEC_CONNECTION: <tspan fill="#00ff41">SECURE</tspan> │ UPTIME: ∞ │ COMPILATION: ACTIVE
    </text>
  </g>
</svg>
