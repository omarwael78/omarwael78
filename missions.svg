<svg width="100%" height="100%" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>

    <style>
      .main-title { font-family: 'Courier New', monospace; font-size: 26px; font-weight: bold; fill: #ffffff; letter-spacing: 2px; }
      .section-title { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
      .project-title { font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #ffffff; }
      .body-text { font-family: 'Courier New', monospace; font-size: 12px; fill: #cccccc; }
      .tech-stack { font-family: 'Courier New', monospace; font-size: 11px; fill: #888888; }
      .footer-text { font-family: 'Courier New', monospace; font-size: 12px; fill: #ff0088; font-weight: bold; }
      
      .green-text { fill: #00ff88; }
      .pink-text { fill: #ff0088; }
      
      .card { stroke: #00ff88; stroke-width: 1.5; fill: #050510; }
      .card-pink { stroke: #ff0088; stroke-width: 1.5; fill: #050510; }
      
      .line { stroke: #00ff88; stroke-width: 1; opacity: 0.3; stroke-dasharray: 5; }
      .line-pink { stroke: #ff0088; stroke-width: 1; opacity: 0.3; stroke-dasharray: 5; }
    </style>
  </defs>

  <!-- الخلفية الرئيسية -->
  <rect width="800" height="420" fill="url(#bg)" rx="8"/>

  <!-- خطوط الفصل مع أنميشن حركي أصيل للـ Dash -->
  <line class="line" x1="40" y1="70" x2="760" y2="70">
    <animate attributeName="stroke-dashoffset" values="0;20" dur="2s" repeatCount="indefinite" calcMode="linear" />
  </line>
  <line class="line-pink" x1="40" y1="375" x2="760" y2="375">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="2s" repeatCount="indefinite" calcMode="linear" />
  </line>

  <!-- العنوان الرئيسي مع تأثير الوميض -->
  <text class="main-title green-text" x="400" y="45" text-anchor="middle">
    🚀 FUTURE MISSIONS &amp; PROJECTS
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
  </text>

  <!-- CARD 1: Web Apps -->
  <g transform="translate(40, 95)">
    <rect class="card" width="220" height="260" rx="6">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" />
    </rect>
    
    <!-- خط الليزر الـ Scanner الأصيل والمضمون -->
    <line x1="4" y1="0" x2="216" y2="0" stroke="#00ff88" stroke-width="1.5" opacity="0.7">
      <animate attributeName="y1" values="5;255;5" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y2" values="5;255;5" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" />
    </line>
    
    <!-- لمبة الحالة الحية بتنور وتطفي -->
    <circle cx="25" cy="25" r="5" fill="#00ff88">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite" />
    </circle>
    
    <text class="section-title green-text" x="40" y="30">[Web Apps]</text>
    <text class="project-title" x="20" y="75">⚡ SaaS Platform</text>
    <text class="body-text" x="20" y="100">Building multi-tenant</text>
    <text class="body-text" x="20" y="118">apps with complex bff,</text>
    <text class="body-text" x="20" y="136">subscription layers,</text>
    <text class="body-text" x="20" y="154">and dynamic billing.</text>
    
    <text class="tech-stack" x="20" y="210">▶ Backend: Django</text>
    <text class="tech-stack" x="20" y="228">▶ Frontend: React</text>
    <text class="tech-stack" x="20" y="246">▶ DB: PostgreSQL</text>
  </g>

  <!-- CARD 2: AI Agents -->
  <g transform="translate(290, 95)">
    <rect class="card-pink" width="220" height="260" rx="6">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" />
    </rect>
    
    <!-- خط الليزر الـ Scanner الوردي -->
    <line x1="4" y1="0" x2="216" y2="0" stroke="#ff0088" stroke-width="1.5" opacity="0.7">
      <animate attributeName="y1" values="255;5;255" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y2" values="255;5;255" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" />
    </line>
    
    <circle cx="25" cy="25" r="5" fill="#ff0088">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
    </circle>
    
    <text class="section-title pink-text" x="40" y="30">[AI Agents]</text>
    <text class="project-title" x="20" y="75">🤖 Autonomous Crew</text>
    <text class="body-text" x="20" y="100">Multi-agent systems</text>
    <text class="body-text" x="20" y="118">for automated research,</text>
    <text class="body-text" x="20" y="136">code generation, and</text>
    <text class="body-text" x="20" y="154">smart data analysis.</text>
    
    <text class="tech-stack" x="20" y="210">▶ Core: Python / FastAPI</text>
    <text class="tech-stack" x="20" y="228">▶ LLMs: LangChain / CrewAI</text>
    <text class="tech-stack" x="20" y="246">▶ Tasks: VectorDB / RAG</text>
  </g>

  <!-- CARD 3: DevOps -->
  <g transform="translate(540, 95)">
    <rect class="card" width="220" height="260" rx="6">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" />
    </rect>
    
    <!-- خط الليزر الـ Scanner الأخضر -->
    <line x1="4" y1="0" x2="216" y2="0" stroke="#00ff88" stroke-width="1.5" opacity="0.7">
      <animate attributeName="y1" values="5;255;5" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y2" values="5;255;5" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" />
    </line>
    
    <circle cx="25" cy="25" r="5" fill="#00ff88">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite" />
    </circle>
    
    <text class="section-title green-text" x="40" y="30">[DevOps]</text>
    <text class="project-title" x="20" y="75">🐳 Microservices</text>
    <text class="body-text" x="20" y="100">Containerizing full</text>
    <text class="body-text" x="20" y="118">stacks, managing</text>
    <text class="body-text" x="20" y="136">K8s clusters, and</text>
    <text class="body-text" x="20" y="154">CI/CD automation.</text>
    
    <text class="tech-stack" x="20" y="210">▶ Infra: Linux / Bash</text>
    <text class="tech-stack" x="20" y="228">▶ Ops: Docker / K8s</text>
    <text class="tech-stack" x="20" y="246">▶ CI/CD: GitHub Actions</text>
  </g>

  <!-- جملة جتس الأسطورية بنبض هادئ -->
  <text class="footer-text" x="400" y="400" text-anchor="middle">
    "Keep moving forward. Even if it's painful." — The Struggler
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" />
  </text>
</svg>
