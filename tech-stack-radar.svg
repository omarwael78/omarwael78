<svg width="100%" height="100%" viewBox="0 0 940 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float { 
        0%, 100% { transform: translateY(0); } 
        50% { transform: translateY(-8px); } 
      }
      /* أنيميشن نبض تتابعي للنقاط المحيطة بالعنوان */
      @keyframes pulseSlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
      @keyframes pulseMid  { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes pulseFast { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.4; } }
      @keyframes pulseCard { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
      
      .main-title { 
        font-family: 'Courier New', monospace; 
        font-size: 32px; 
        font-weight: bold; 
        fill: #ffffff; 
        letter-spacing: 2px; 
      }
      .section-title { 
        font-family: 'Courier New', monospace; 
        font-size: 18px; 
        font-weight: bold; 
      }
      .tool-text { 
        font-family: 'Courier New', monospace; 
        font-size: 14px; 
        fill: #ffffff; 
        font-weight: bold;
      }
      .desc-text { 
        font-family: 'Courier New', monospace; 
        font-size: 11px; 
        fill: #aaaaaa; 
      }
      
      .green-glow { fill: #00cc66; }
      .pink-glow { fill: #cc0066; }
      .orange-glow { fill: #ff9900; }
      
      .card-green { stroke: #00cc66; stroke-width: 2; fill: #070708; }
      .card-pink { stroke: #cc0066; stroke-width: 2; fill: #070708; }
      .card-orange { stroke: #ff9900; stroke-width: 2; fill: #070708; }
      
      .scan-line-green { stroke: #00cc66; stroke-width: 1.5; opacity: 0.6; }
      .scan-line-pink { stroke: #cc0066; stroke-width: 1.5; opacity: 0.6; }
      .scan-line-orange { stroke: #ff9900; stroke-width: 1.5; opacity: 0.6; }
      
      /* فئات النبض المتدرجة */
      .dot-1 { animation: pulseSlow 2s infinite ease-in-out; }
      .dot-2 { animation: pulseMid 1.6s infinite ease-in-out; }
      .dot-3 { animation: pulseFast 1.2s infinite ease-in-out; }
      .card-dot { animation: pulseCard 1.5s infinite ease-in-out; }
    </style>
    
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
    </pattern>

    <!-- فلتر توهج خفيف للنقاط المضيئة -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- الخلفية الكلية والشبكة -->
  <rect width="940" height="520" fill="#070708" rx="8"/>
  <rect width="940" height="520" fill="url(#grid)"/>
  
  <!-- العنوان الرئيسي بدون إيموجيز ومحاط بـ 6 نقاط نيون نابضة بشكل متناسق -->
  <g transform="translate(470, 50)">
    <!-- النقاط جهة اليسار -->
    <circle class="dot-1" cx="-240" cy="-10" r="3" fill="#00cc66" opacity="0.4" filter="url(#neonGlow)"/>
    <circle class="dot-2" cx="-225" cy="-10" r="4.5" fill="#00cc66" opacity="0.7" filter="url(#neonGlow)"/>
    <circle class="dot-3" cx="-210" cy="-10" r="6" fill="#00cc66" filter="url(#neonGlow)"/>
    
    <!-- نص العنوان في المنتصف تماماً -->
    <text class="main-title green-glow" x="0" y="0" text-anchor="middle">
      CURRENT TECH STACK
    </text>
    
    <!-- النقاط جهة اليمين -->
    <circle class="dot-3" cx="210" cy="-10" r="6" fill="#00cc66" filter="url(#neonGlow)"/>
    <circle class="dot-2" cx="225" cy="-10" r="4.5" fill="#00cc66" opacity="0.7" filter="url(#neonGlow)"/>
    <circle class="dot-1" cx="240" cy="-10" r="3" fill="#00cc66" opacity="0.4" filter="url(#neonGlow)"/>
  </g>
  
  <line x1="50" y1="80" x2="890" y2="80" stroke="#222222" stroke-width="1" opacity="0.5"/>
  
  <!-- CARD 1: Backend -->
  <g transform="translate(50, 110)">
    <rect class="card-green" width="400" height="180" rx="6" style="animation: float 3s infinite ease-in-out;">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <line class="scan-line-green" x1="10" y1="0" x2="390" y2="0">
      <animate attributeName="y1" values="5;175;5" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="5;175;5" dur="4s" repeatCount="indefinite"/>
    </line>
    
    <circle cx="25" cy="28" r="5" fill="#00cc66" class="card-dot"/>
    <text class="section-title green-glow" x="45" y="33">⚙️ BACKEND CORE</text>
    
    <text class="tool-text" x="35" y="68">→ Django 5.x</text>
    <text class="desc-text" x="55" y="86">Monolithic apps, REST APIs, Admin power</text>
    
    <text class="tool-text" x="35" y="113">→ FastAPI</text>
    <text class="desc-text" x="55" y="131">High-performance async APIs, AI integration</text>
    
    <text class="tool-text" x="35" y="158">→ PostgreSQL + Redis</text>
    <text class="desc-text" x="55" y="176">Data persistence + caching layer</text>
  </g>
  
  <!-- CARD 2: Frontend -->
  <g transform="translate(490, 110)">
    <rect class="card-pink" width="400" height="180" rx="6" style="animation: float 3.5s infinite ease-in-out;">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    
    <line class="scan-line-pink" x1="10" y1="0" x2="390" y2="0">
      <animate attributeName="y1" values="175;5;175" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="175;5;175" dur="4.5s" repeatCount="indefinite"/>
    </line>
    
    <circle cx="25" cy="28" r="5" fill="#cc0066" class="card-dot"/>
    <text class="section-title pink-glow" x="45" y="33">🎨 FRONTEND TOOLS</text>
    
    <text class="tool-text" x="35" y="68">→ React 18</text>
    <text class="desc-text" x="55" y="86">Component-based UIs, state management</text>
    
    <text class="tool-text" x="35" y="113">→ Bootstrap + Tailwind CSS</text>
    <text class="desc-text" x="55" y="131">Rapid prototyping, responsive design</text>
    
    <text class="tool-text" x="35" y="158">→ jQuery (when needed)</text>
    <text class="desc-text" x="55" y="176">Quick DOM manipulation for legacy projects</text>
  </g>
  
  <!-- CARD 3: DevOps -->
  <g transform="translate(50, 315)">
    <rect class="card-green" width="400" height="180" rx="6" style="animation: float 4s infinite ease-in-out;">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </rect>
    
    <line class="scan-line-green" x1="10" y1="0" x2="390" y2="0">
      <animate attributeName="y1" values="5;175;5" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="5;175;5" dur="5s" repeatCount="indefinite"/>
    </line>
    
    <circle cx="25" cy="28" r="5" fill="#00cc66" class="card-dot"/>
    <text class="section-title green-glow" x="45" y="33">🐳 DEVOPS &amp; INFRA</text>
    
    <text class="tool-text" x="35" y="68">→ Docker + Kubernetes</text>
    <text class="desc-text" x="55" y="86">Containerization, orchestration, scaling</text>
    
    <text class="tool-text" x="35" y="113">→ Linux (Ubuntu btw) + Bash</text>
    <text class="desc-text" x="55" y="131">Server management, automation scripts</text>
    
    <text class="tool-text" x="35" y="158">→ GitHub Actions</text>
    <text class="desc-text" x="55" y="176">CI/CD pipelines, automated testing</text>
  </g>

  <!-- CARD 4: AI & Automation -->
  <g transform="translate(490, 315)">
    <rect class="card-orange" width="400" height="180" rx="6" style="animation: float 3.2s infinite ease-in-out;">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    
    <line class="scan-line-orange" x1="10" y1="0" x2="390" y2="0">
      <animate attributeName="y1" values="175;5;175" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="175;5;175" dur="3.8s" repeatCount="indefinite"/>
    </line>
    
    <circle cx="25" cy="28" r="5" fill="#ff9900" class="card-dot"/>
    <text class="section-title orange-glow" x="45" y="33">🤖 AI &amp; AUTOMATION</text>
    
    <text class="tool-text" x="35" y="68">→ LangChain + CrewAI</text>
    <text class="desc-text" x="55" y="86">Multi-agent systems, LLM orchestration</text>
    
    <text class="tool-text" x="35" y="113">→ n8n + Zapier</text>
    <text class="desc-text" x="55" y="131">Workflow automation, API integrations</text>
    
    <text class="tool-text" x="35" y="158">→ OpenAI API + Ollama</text>
    <text class="desc-text" x="55" y="176">Cloud &amp; local LLM deployment</text>
  </g>
</svg>
